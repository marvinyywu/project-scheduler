services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      - db
    environment:
      ConnectionStrings__Scheduling: "Server=db;Database=ProjectScheduler;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True"
      Cors__AllowedOrigins__0: "http://localhost:4200"
    ports:
      - "8080:8080"

  # web/src/environments/environment.production.ts's apiBaseUrl must be
  # http://localhost:8080/api for this build to work. The browser runs on
  # your host machine, not inside this compose network, so the api service
  # name resolves for the api container's own outbound calls but means
  # nothing to the browser making requests from localhost:4200.
  web:
    build:
      context: web
    ports:
      - "4200:80"

volumes:
  mssql-data:
